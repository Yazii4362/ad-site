  <style>
    .type-tabs { display:flex; gap:var(--space-2); margin-bottom:var(--space-4); }
    .type-tab {
      flex:1; padding:var(--space-2) var(--space-3);
      border:var(--border-width) solid var(--border-color);
      border-radius:var(--radius-full);
      font-size:var(--font-size-xs); font-weight:var(--font-weight-bold);
      background:var(--bg-surface-2); color:var(--text-secondary);
      cursor:pointer; transition:all var(--transition-fast); text-align:center;
    }
    .type-tab.active { background:var(--color-primary); color:#fff; border-color:var(--color-primary); }

    .stop-list { display:flex; flex-direction:column; gap:var(--space-2); }
    .stop-item {
      display:flex; align-items:center; gap:var(--space-2);
      background:var(--bg-surface-2); border:var(--border-width) solid var(--border-color);
      border-radius:var(--radius-md); padding:var(--space-2) var(--space-3);
    }
    .stop-item input[type="color"] { width:36px; height:36px; }
    .stop-item input[type="number"] {
      width:60px; padding:var(--space-1) var(--space-2);
      border:var(--border-width) solid var(--border-color);
      border-radius:var(--radius-sm); background:var(--bg-surface);
      color:var(--text-primary); font-size:var(--font-size-xs); text-align:center;
    }
    .stop-item .stop-pct { font-size:var(--font-size-xs); color:var(--text-muted); }
    .stop-remove { color:var(--color-danger); font-size:1rem; padding:2px 6px; border-radius:var(--radius-sm); }
    .stop-remove:hover { background:var(--color-red-light); }

    .preview-box { min-height:280px; border-radius:var(--radius-xl); border:var(--border-width) solid var(--border-color); transition:all 0.2s; }
  </style>
</head>
<body class="page-wrapper">
  <header class="site-header">
    <div class="container">
      <a href="../index.html" class="logo"><span class="logo-mark">P</span><span class="logo-text">publi<em>Kit</em></span></a>

        <a href="shadow.html">그림자</a>

        <a href="utility/web-font-convert.html">웹폰트 변환</a>
      </nav>

        <button class="theme-toggle" id="theme-toggle">🌙</button>
      </div>
    </div>
  </header>

  <main class="page-main">
    <div class="container">
      <div class="page-hero">
        <span class="badge badge-blue">🌈 CSS 도구</span>
        <h1>그라데이션 생성기</h1>
        <p>Linear · Radial · Conic 그라데이션을 실시간으로 만들고 CSS 코드를 바로 복사하세요.</p>
      </div>

      <div class="tool-layout">
        <!-- 컨트롤 -->
        <aside class="tool-controls">
          <div class="card" style="gap:var(--space-5); display:flex; flex-direction:column;">

            <div class="control-group">
              <span class="label">그라데이션 타입</span>
              <div class="type-tabs">
                <button class="type-tab active" data-type="linear">Linear</button>
                <button class="type-tab" data-type="radial">Radial</button>
                <button class="type-tab" data-type="conic">Conic</button>
              </div>
            </div>

            <div class="control-group" id="angle-group">
              <div class="control-row">
                <span class="label" style="margin:0">각도</span>
                <span class="control-value" id="angle-val">135°</span>
              </div>
              <input type="range" id="angle" min="0" max="360" value="135" />
            </div>

            <div class="control-group">
              <span class="label">컬러 스탑</span>
              <div class="stop-list" id="stop-list"></div>
              <button class="btn btn-outline btn-sm" id="add-stop" style="margin-top:var(--space-2);">+ 컬러 추가</button>
            </div>

            <div class="control-group">
              <div class="control-row">
                <span class="label" style="margin:0">불투명도</span>
                <span class="control-value" id="opacity-val">100%</span>
              </div>
              <input type="range" id="opacity" min="0" max="100" value="100" />
            </div>

          </div>
        </aside>

        <!-- 미리보기 + 코드 -->
        <div class="tool-preview-panel">
          <div class="card card-flat" style="padding:var(--space-4);">
            <div class="preview-box" id="preview"></div>
          </div>
          <div class="card card-flat">
            <div class="flex items-center justify-between" style="margin-bottom:var(--space-3);">
              <span class="label" style="margin:0">생성된 CSS</span>
              <button class="btn btn-primary btn-sm btn-copy" data-target="#code-output">복사</button>
            </div>
            <div class="code-block" id="code-output"></div>
          </div>
        </div>
      </div>

      <div class="ad-wrap" style="margin-top:var(--space-10); align-items:center;">
        <span class="ad-label">AD</span>
        <div class="ad-rectangle">300 × 250 · Google AdSense</div>
      </div>
    </div>
  </main>

  <footer class="site-footer"><div class="container"><div class="footer-inner">
    <span class="footer-copy">© 2025 publiKit.</span>
    <nav class="footer-links"><a href="#">GitHub</a><a href="privacy.html">개인정보처리방침</a><a href="contact.html">문의</a></nav>
  </div></div></footer>
  <div class="toast"></div>
  <script src="../assets/js/main.js"></script>
  <script>
    let stops = [
      { color: '#1B6FFF', pos: 0 },
      { color: '#2AC96B', pos: 50 },
      { color: '#FFD426', pos: 100 }
    ];
    let gradType = 'linear';

    const preview    = document.getElementById('preview');
    const codeOutput = document.getElementById('code-output');
    const angleInput = document.getElementById('angle');
    const angleVal   = document.getElementById('angle-val');
    const opacityInput = document.getElementById('opacity');
    const opacityVal = document.getElementById('opacity-val');
    const stopList   = document.getElementById('stop-list');
    const angleGroup = document.getElementById('angle-group');

    /* ── 타입 탭 ── */
    document.querySelectorAll('.type-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.type-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        gradType = btn.dataset.type;
        angleGroup.style.display = gradType === 'linear' ? 'flex' : 'none';
        update();
      });
    });

    angleInput.addEventListener('input', () => { angleVal.textContent = angleInput.value + '°'; update(); });
    opacityInput.addEventListener('input', () => { opacityVal.textContent = opacityInput.value + '%'; update(); });
    document.getElementById('add-stop').addEventListener('click', () => {
      stops.push({ color: '#FF4A4A', pos: Math.min(100, stops[stops.length-1].pos + 20) });
      renderStops(); update();
    });

    function renderStops() {
      stopList.innerHTML = stops.map((s, i) => `
        <div class="stop-item">
          <input type="color" value="${s.color}" onchange="stops[${i}].color=this.value;update();" />
          <input type="number" min="0" max="100" value="${s.pos}" onchange="stops[${i}].pos=+this.value;update();" />
          <span class="stop-pct">%</span>
          <span style="flex:1"></span>
          ${stops.length > 2 ? `<button class="stop-remove" onclick="stops.splice(${i},1);renderStops();update();">✕</button>` : ''}
        </div>`).join('');
    }

    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
      return alpha < 100 ? `rgba(${r},${g},${b},${(alpha/100).toFixed(2)})` : hex;
    }

    function update() {
      const alpha = +opacityInput.value;
      const sortedStops = [...stops].sort((a,b) => a.pos - b.pos);
      const stopsStr = sortedStops.map(s => `${hexToRgba(s.color, alpha)} ${s.pos}%`).join(', ');

      let gradCSS = '';
      if (gradType === 'linear')  gradCSS = `linear-gradient(${angleInput.value}deg, ${stopsStr})`;
      else if (gradType === 'radial') gradCSS = `radial-gradient(circle, ${stopsStr})`;
      else gradCSS = `conic-gradient(from 0deg, ${stopsStr})`;

      preview.style.background = gradCSS;
      codeOutput.textContent =
`.gradient {\n  background: ${gradCSS};\n}`;
    }

    renderStops();
    update();
  </script>
</body>
</html>
