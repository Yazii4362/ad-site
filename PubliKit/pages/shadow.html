<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>그림자 생성기 — publiKit</title>
  <script>(function(){const t=localStorage.getItem('publikit-theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>
  <link rel="stylesheet" href="../assets/css/variables.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" />
  <style>
    .shadow-type-tabs { display:flex; gap:var(--space-2); margin-bottom:var(--space-4); }
    .shadow-tab {
      flex:1; padding:var(--space-2) var(--space-3); text-align:center;
      border:var(--border-width) solid var(--border-color); border-radius:var(--radius-full);
      font-size:var(--font-size-xs); font-weight:var(--font-weight-bold);
      background:var(--bg-surface-2); color:var(--text-secondary); cursor:pointer;
      transition:all var(--transition-fast);
    }
    .shadow-tab.active { background:var(--color-primary); color:#fff; border-color:var(--color-primary); }

    .layer-list { display:flex; flex-direction:column; gap:var(--space-2); }
    .layer-item {
      border:var(--border-width) solid var(--border-color); border-radius:var(--radius-md);
      background:var(--bg-surface-2); overflow:hidden;
    }
    .layer-header {
      display:flex; align-items:center; gap:var(--space-2);
      padding:var(--space-2) var(--space-3); cursor:pointer;
    }
    .layer-dot { width:14px; height:14px; border-radius:50%; border:2px solid var(--color-black); flex-shrink:0; }
    .layer-name { flex:1; font-size:var(--font-size-sm); font-weight:var(--font-weight-medium); }
    .layer-toggle { font-size:0.7rem; color:var(--text-muted); }
    .layer-body { padding:var(--space-3); display:none; border-top:var(--border-width) solid var(--border-color); }
    .layer-body.open { display:block; }
    .mini-row { display:flex; align-items:center; gap:var(--space-2); margin-bottom:var(--space-2); }
    .mini-label { font-size:var(--font-size-xs); color:var(--text-muted); width:48px; flex-shrink:0; }
    .mini-val { font-size:var(--font-size-xs); font-weight:var(--font-weight-bold); color:var(--color-primary); min-width:36px; text-align:right; }
    .mini-row input[type="range"] { flex:1; }

    .preview-box {
      min-height:280px; border-radius:var(--radius-xl);
      background:var(--bg-surface); border:var(--border-width) solid var(--border-color);
      display:flex; align-items:center; justify-content:center;
    }
    .preview-target {
      width:160px; height:100px; border-radius:var(--radius-lg);
      background:var(--color-primary); display:flex; align-items:center; justify-content:center;
      color:#fff; font-weight:var(--font-weight-bold); font-size:var(--font-size-sm);
      transition:all 0.2s;
    }
    .preview-text-target {
      font-size:3rem; font-weight:var(--font-weight-black); color:var(--color-primary);
      transition:all 0.2s; text-align:center;
    }
  </style>
</head>
<body class="page-wrapper">
  <header class="site-header">
    <div class="container">
      <a href="../index.html" class="logo"><span class="logo-mark">P</span><span class="logo-text">publi<em>Kit</em></span></a>
      <nav class="header-nav">
        <a href="gradient.html">그라데이션</a>
        <a href="shadow.html" class="active">그림자</a>
        <a href="dim.html">딤처리</a>
        <a href="font-gradient.html">텍스트 그라데이션</a>
        <a href="button-gradient.html">버튼</a>
        <a href="utility/web-font-convert.html">웹폰트 변환</a>
      </nav>
      <div class="header-actions"><button class="theme-toggle" id="theme-toggle">🌙</button></div>
    </div>
  </header>

  <main class="page-main">
    <div class="container">
      <div class="page-hero">
        <span class="badge badge-blue">🌑 CSS 도구</span>
        <h1>그림자 생성기</h1>
        <p>box-shadow · text-shadow 다중 레이어를 쌓아 실시간으로 미리보고 코드를 복사하세요.</p>
      </div>

      <div class="tool-layout">
        <aside class="tool-controls">
          <div class="card" style="display:flex;flex-direction:column;gap:var(--space-4);">

            <div class="control-group">
              <span class="label">그림자 타입</span>
              <div class="shadow-type-tabs">
                <button class="shadow-tab active" data-st="box">Box Shadow</button>
                <button class="shadow-tab" data-st="text">Text Shadow</button>
              </div>
            </div>

            <div class="control-group">
              <div class="flex items-center justify-between" style="margin-bottom:var(--space-2);">
                <span class="label" style="margin:0">레이어</span>
                <button class="btn btn-outline btn-sm" id="add-layer">+ 추가</button>
              </div>
              <div class="layer-list" id="layer-list"></div>
            </div>

            <div class="control-group" id="inset-group">
              <label class="flex items-center gap-2" style="cursor:pointer; font-size:var(--font-size-sm);">
                <input type="checkbox" id="inset-check" style="width:16px;height:16px;" />
                inset (안쪽 그림자)
              </label>
            </div>

          </div>
        </aside>

        <div class="tool-preview-panel">
          <div class="card card-flat" style="padding:var(--space-4);">
            <div class="preview-box" id="preview-box">
              <div class="preview-target" id="preview-target">Preview</div>
            </div>
          </div>
          <div class="card card-flat">
            <div class="flex items-center justify-between" style="margin-bottom:var(--space-3);">
              <span class="label" style="margin:0">생성된 CSS</span>
              <button class="btn btn-primary btn-sm btn-copy" data-target="#code-output">복사</button>
            </div>
            <div class="code-block" id="code-output"></div>
          </div>
        </div>
      </div>

      <div class="ad-wrap" style="margin-top:var(--space-10);align-items:center;">
        <span class="ad-label">AD</span>
        <div class="ad-rectangle">300 × 250 · Google AdSense</div>
      </div>
    </div>
  </main>

  <footer class="site-footer"><div class="container"><div class="footer-inner">
    <span class="footer-copy">© 2025 publiKit.</span>
    <nav class="footer-links"><a href="#">GitHub</a><a href="#">문의</a></nav>
  </div></div></footer>
  <div class="toast"></div>
  <script src="../assets/js/main.js"></script>
  <script>
    let shadowType = 'box';
    let layers = [
      { color:'#1B6FFF', x:4, y:4, blur:0, spread:0, enabled:true },
      { color:'#2AC96B', x:8, y:8, blur:0, spread:0, enabled:true },
    ];

    const layerListEl  = document.getElementById('layer-list');
    const codeOutput   = document.getElementById('code-output');
    const previewTarget= document.getElementById('preview-target');
    const previewBox   = document.getElementById('preview-box');
    const insetCheck   = document.getElementById('inset-check');
    const insetGroup   = document.getElementById('inset-group');

    document.querySelectorAll('.shadow-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.shadow-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        shadowType = btn.dataset.st;
        insetGroup.style.display = shadowType === 'box' ? 'flex' : 'none';

        // 미리보기 대상 교체
        if (shadowType === 'text') {
          previewTarget.className = 'preview-text-target';
          previewTarget.textContent = 'Aa';
        } else {
          previewTarget.className = 'preview-target';
          previewTarget.textContent = 'Preview';
        }
        update();
      });
    });

    insetCheck.addEventListener('change', update);
    document.getElementById('add-layer').addEventListener('click', () => {
      layers.push({ color:'#FF4A4A', x:0, y:0, blur:10, spread:0, enabled:true });
      renderLayers(); update();
    });

    function renderLayers() {
      layerListEl.innerHTML = layers.map((l, i) => `
        <div class="layer-item">
          <div class="layer-header" onclick="toggleLayer(${i})">
            <span class="layer-dot" style="background:${l.color}"></span>
            <span class="layer-name">레이어 ${i+1}</span>
            <label onclick="event.stopPropagation()" style="display:flex;align-items:center;gap:4px;font-size:11px;cursor:pointer;">
              <input type="checkbox" ${l.enabled?'checked':''} onchange="layers[${i}].enabled=this.checked;update();" />ON
            </label>
            ${layers.length>1 ? `<button onclick="event.stopPropagation();layers.splice(${i},1);renderLayers();update();" style="color:var(--color-danger);font-size:0.8rem;padding:2px 4px;">✕</button>` : ''}
            <span class="layer-toggle">▼</span>
          </div>
          <div class="layer-body" id="layer-body-${i}">
            <div class="mini-row">
              <span class="mini-label">색상</span>
              <input type="color" value="${l.color}" style="width:36px;height:30px;" onchange="layers[${i}].color=this.value;renderLayers();update();" />
            </div>
            ${['x','y','blur','spread'].map(prop => {
              const isBlurSpread = prop==='blur'||prop==='spread';
              const min = isBlurSpread ? 0 : -100;
              const labels = {x:'X 오프셋',y:'Y 오프셋',blur:'블러',spread:'스프레드'};
              return `<div class="mini-row">
                <span class="mini-label">${labels[prop]}</span>
                <input type="range" min="${min}" max="100" value="${l[prop]}" oninput="layers[${i}]['${prop}']=+this.value;this.nextElementSibling.textContent=this.value+'px';update();" />
                <span class="mini-val">${l[prop]}px</span>
              </div>`;
            }).join('')}
          </div>
        </div>`).join('');
    }

    function toggleLayer(i) {
      const body = document.getElementById(`layer-body-${i}`);
      body.classList.toggle('open');
    }

    function update() {
      const inset = insetCheck.checked && shadowType==='box' ? 'inset ' : '';
      const shadows = layers.filter(l=>l.enabled).map(l => {
        if (shadowType === 'text') return `${l.x}px ${l.y}px ${l.blur}px ${l.color}`;
        return `${inset}${l.x}px ${l.y}px ${l.blur}px ${l.spread}px ${l.color}`;
      }).join(',\n         ');

      const prop = shadowType === 'box' ? 'box-shadow' : 'text-shadow';
      if (shadowType === 'box') previewTarget.style.boxShadow = shadows.replace(/\n\s+/g,', ');
      else { previewTarget.style.textShadow = shadows.replace(/\n\s+/g,', '); previewTarget.style.boxShadow=''; }

      codeOutput.textContent = `.element {\n  ${prop}: ${shadows};\n}`;
    }

    renderLayers();
    update();
    document.getElementById('layer-body-0').classList.add('open');
  </script>
</body>
</html>
